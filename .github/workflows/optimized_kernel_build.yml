name: opt_Build_oneplus_sm8750

on:
  workflow_dispatch:
    inputs:
      REPO_MANIFEST:
        description: "Select the model: "
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_13t'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
        default: 'oneplus_13'

      keep_original_settings:
        description: "Keep the original kernel name and build time"
        required: false
        default: true
        type: boolean

      custom_kernel_suffix:
        description: "✏️ Custom kernel suffix (Example: -TG@qdykernel)"
        required: false
        default: ''

      custom_kernel_time:
        description: "⏰ Custom build time (Example: Tue Dec 17 23:36:49 UTC 2024)"
        required: false
        default: ''

      enable_feature_x:
        description: "Generate AK3 without KPM - Uncheck to only generate AK3 with KPM"
        required: false
        default: true
        type: boolean

      enable_feature_y:
        description: "Enable lz4kd"
        required: false
        default: true
        type: boolean

      enable_feature_z:
        description: "Add Fengchi driver"
        required: false
        default: true
        type: boolean

      enable_feature_b:
        description: "Add BBR algorithm"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build_${{ github.event.inputs.REPO_MANIFEST }}
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_MAXSIZE: "8G"
      PATH: /usr/lib/ccache:$PATH
      CCACHE_DIR: ${{ github.workspace }}/.ccache_${{ github.event.inputs.REPO_MANIFEST }}

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Set environment variables
        run: |
          echo "REPO_MANIFEST=${{ github.event.inputs.REPO_MANIFEST }}" >> $GITHUB_ENV
          echo "DEVICES_NAME=${{ github.event.inputs.REPO_MANIFEST }}" >> $GITHUB_ENV

      - name: 📦 Install and cache dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: python3 git curl ccache libelf-dev build-essential flex bison libssl-dev libncurses-dev liblz4-tool zlib1g-dev libxml2-utils rsync unzip

      - name: 📦 Configure Git
        run: |
          git config --global user.name "Q1udaoyu"
          git config --global user.email "sucisama2888@gmail.com"

      - name: 🔧 Set up repo tool
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: 📥 Initialize and sync kernel repo
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/showdo/kernel_manifest.git \
            -b refs/heads/oneplus/sm8750 \
            -m ${REPO_MANIFEST}.xml --depth=1
          repo sync -c -j$(nproc --all) --no-tags

      - name: ⚙️ Setup SuKiSU Ultra
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/susfs-main/kernel/setup.sh" | bash -s susfs-main
          ./KernelSU/setup.bin

      - name: ⚙️ Setup SuSFS + lz4kd + BBR + defconfig
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-android15-6.6
          git clone https://github.com/SukiSU-Ultra/SukiSU_patch.git
          cp -r SukiSU_patch/other/zram/lz4k/* kernel_platform/common/
          cp -r SukiSU_patch/hooks/syscall_hooks.patch kernel_platform/common/
          cd kernel_platform/common
          patch -p1 < syscall_hooks.patch || true
          cd ../..

      - name: 🔧 Build kernel
        run: |
          cd kernel_workspace/kernel_platform/common
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            CC="ccache clang" O=out gki_defconfig Image

      - name: 📦 Prepare AnyKernel3
        run: |
          git clone https://github.com/KernelSU-Next/AnyKernel3.git --depth=1 AnyKernel3_Template
          rm -rf ./AnyKernel3_Template/.git ./AnyKernel3_Template/push.sh
          cp -r AnyKernel3_Template AnyKernel3
          cp -r AnyKernel3_Template AnyKernel3_NoKPM
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3/
          cp kernel_workspace/kernel_platform/common/out/arch/arm64/boot/Image ./AnyKernel3_NoKPM

      - name: 📤 Upload AnyKernel3
        uses: actions/upload-artifact@v4
        with:
          name: All_Kernel_Artifacts
          path: |
            ./AnyKernel3/*
            ./AnyKernel3_NoKPM/*
